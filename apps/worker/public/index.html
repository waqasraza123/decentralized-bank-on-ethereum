<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stealth Trails Bank Worker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
        background: #07111f;
        color: #e5eefc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(46, 125, 255, 0.28), transparent 42%),
          linear-gradient(180deg, #07111f 0%, #02060d 100%);
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 28px;
        background: rgba(7, 17, 31, 0.78);
        box-shadow: 0 30px 80px rgba(2, 6, 13, 0.55);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: #c5d4f0;
      }

      code {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(46, 125, 255, 0.16);
        color: #dbeafe;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stealth Trails Bank Worker</h1>
      <p>
        This deployment runs the asynchronous bank worker through Vercel Functions
        and Cron Jobs instead of a long-lived process.
      </p>
      <p>
        Health endpoint: <code>/api/health</code>
      </p>
      <p>
        Cron entrypoints are protected by <code>CRON_SECRET</code> and are intended
        for Vercel-managed invocations only.
      </p>
    </main>
  </body>
</html>
