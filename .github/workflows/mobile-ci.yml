name: mobile-ci

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/config/**"
      - "packages/i18n/**"
      - "packages/types/**"
      - "packages/ui-foundation/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/config/**"
      - "packages/i18n/**"
      - "packages/types/**"
      - "packages/ui-foundation/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-ci.yml"

jobs:
  verify-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify mobile app
        run: pnpm mobile:verify
